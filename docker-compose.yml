services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sengrid
      POSTGRES_USER: sengrid
      POSTGRES_PASSWORD: sengrid
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"

  local-relay:
    image: boky/postfix:latest
    profiles:
      - relay
    environment:
      ALLOWED_SENDER_DOMAINS: example.com
      HOSTNAME: mail.local.test
      RELAYHOST: ""
    ports:
      - "2525:587"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: sengrid
      MINIO_ROOT_PASSWORD: sengrid123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana

volumes:
  postgres-data:
  minio-data:
  grafana-data:
